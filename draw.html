<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>抽奖页</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">

  <!-- 与首页同一套视觉（直接用首页 CSS） -->
  <link rel="stylesheet" href="/CSS/app.css" />
</head>

<body class="min-h-screen antialiased">
  <div class="bg"></div>
  <div class="veil"></div>
  <div class="smoke"></div>
  <div class="dust"></div>

  <main class="max-w-2xl mx-auto px-5 sm:px-6 py-16">
    <div class="panel p-6 sm:p-8">
      <div class="badge-line">
        <div class="badge">Premium Access</div>
        <div class="sep"></div>
        <div class="text-xs text-white/55">复制后将跳回首页并带上资格码</div>
      </div>

      <h1 class="mt-4 title-font" style="font-size:28px;line-height:1.1;">抽奖页面</h1>
      <p class="mt-2 text-white/70">当前资格码：</p>

      <div class="modal-code" id="result">未检测到 code 参数</div>

      <div class="modal-actions" style="margin-top:14px;">
        <button class="btn btn-ghost" id="copyBtn" type="button">点一下复制</button>
        <button class="btn" id="goBtn" type="button">去抽奖</button>
      </div>

      <div class="modal-tip" id="tip" style="margin-top:12px;">
        提示：点击“点一下复制”后会自动跳转回首页，并自动填入输入框。
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const code = (params.get('code') || '').trim();

    const el = document.getElementById('result');
    const copyBtn = document.getElementById('copyBtn');
    const goBtn = document.getElementById('goBtn');
    const tip = document.getElementById('tip');

    el.textContent = code ? code : '未检测到 code 参数';

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
        return true;
      }catch(e){
        try{
          const ta = document.createElement('textarea');
          ta.value = text;
          ta.setAttribute('readonly','');
          ta.style.position='fixed';
          ta.style.top='-9999px';
          document.body.appendChild(ta);
          ta.select();
          document.execCommand('copy');
          ta.remove();
          return true;
        }catch(_){
          return false;
        }
      }
    }

    function goHomeWithCode(){
      if (!code){
        location.href = '/';
        return;
      }
      // 带时间戳让 Telegram 更容易刷新 & 防缓存
      const v = Date.now();
      location.href = `/?code=${encodeURIComponent(code)}&v=${v}#draw`;
    }

    copyBtn.addEventListener('click', async () => {
      if (!code) { alert('没有可复制的资格码'); return; }
      const ok = await copyText(code);
      copyBtn.textContent = ok ? '已复制 ✅' : '复制失败';
      tip.textContent = ok ? '已复制，正在返回首页...' : '复制失败，请手动返回首页。';
      setTimeout(() => {
        if (ok) goHomeWithCode();
      }, 450);
    });

    goBtn.addEventListener('click', () => {
      goHomeWithCode();
    });
  </script>
</body>
</html>
