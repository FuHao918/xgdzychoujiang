<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>复制资格码</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Serif+SC:wght@600;700;900&display=swap" rel="stylesheet">

  <!-- 同样做双目录兼容 -->
  <link rel="stylesheet" href="/CSS/app.css" />
  <link rel="stylesheet" href="/css/app.css" />
</head>

<body class="min-h-screen antialiased">
  <div class="bg"></div>
  <div class="veil"></div>
  <div class="smoke"></div>
  <div class="dust"></div>

  <main class="max-w-2xl mx-auto px-5 sm:px-6 py-14">
    <div class="panel p-6 sm:p-8">
      <div class="badge-line">
        <div class="badge">CODE</div>
        <div class="sep"></div>
        <div class="text-xs text-white/55">点一下复制并返回抽奖</div>
      </div>

      <h1 class="mt-4 text-2xl sm:text-3xl font-semibold tracking-tight title-font">
        复制资格码
      </h1>

      <p class="mt-3 text-white/70 leading-relaxed">
        复制后将自动跳转回首页，并自动填入资格码（不会自动抽奖）。
      </p>

      <div class="mt-6">
        <div class="text-sm text-white/70">当前资格码</div>
        <div class="code-box" id="result">-</div>
      </div>

      <div class="mt-5">
        <button class="btn btn-wide" id="copyBtn" type="button">点一下复制并去抽奖</button>
        <div class="mt-3 text-xs text-white/45">
          如果你不想复制，也可以直接点上面按钮继续。
        </div>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(location.search);
    const code = (params.get('code') || '').trim();
    const v = (params.get('v') || '').trim();
    const el = document.getElementById('result');
    const btn = document.getElementById('copyBtn');

    el.textContent = code || '未检测到 code 参数';

    async function goHome(){
      const u = new URL(location.origin + '/');
      if (code) u.searchParams.set('code', code);
      if (v) u.searchParams.set('v', v);
      // 标记来自复制页（首页可用来滚动到输入框）
      u.searchParams.set('from', 'draw');
      location.href = u.toString();
    }

    async function copyAndGo(){
      if (!code) return goHome();
      try{
        await navigator.clipboard.writeText(code);
      }catch(e){
        // 兼容方案
        const ta = document.createElement('textarea');
        ta.value = code;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
      btn.textContent = '已复制 ✅ 正在跳转…';
      setTimeout(goHome, 450);
    }

    btn.addEventListener('click', copyAndGo);
  </script>
</body>
</html>
