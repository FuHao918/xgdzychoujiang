<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>抽奖页</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet">

  <style>
    :root{ color-scheme: light; --ink:#121724; --gold:#C9A24B; --gold2:#E9D6A4; }
    *{ box-sizing:border-box; font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, "Helvetica Neue", Arial; }
    body{
      margin:0; min-height:100vh; color: var(--ink);
      background:
        radial-gradient(1400px 860px at 12% 8%, rgba(201,162,75,0.20), transparent 58%),
        radial-gradient(1200px 820px at 78% 14%, rgba(140,170,255,0.18), transparent 62%),
        radial-gradient(1200px 1200px at 50% 120%, rgba(18,23,36,0.10), transparent 64%),
        linear-gradient(180deg, #F6F7FB, #F2F4FA 45%, #EEF2F8);
      overflow:hidden;
    }
    .bg::before{
      content:""; position:fixed; inset:-22vh -22vw; pointer-events:none;
      opacity:.82; filter: blur(16px);
      background:
        radial-gradient(70vw 48vh at 18% 44%, rgba(18,23,36,0.10), transparent 62%),
        radial-gradient(70vw 44vh at 72% 56%, rgba(201,162,75,0.10), transparent 62%),
        radial-gradient(80vw 56vh at 55% 22%, rgba(140,170,255,0.10), transparent 65%);
      animation: smokeDrift 9s ease-in-out infinite alternate;
    }
    .bg::after{
      content:""; position:fixed; inset:0; pointer-events:none;
      opacity:.70;
      background:
        radial-gradient(3px 3px at 12% 28%, rgba(201,162,75,0.35), transparent 60%),
        radial-gradient(3px 3px at 70% 22%, rgba(201,162,75,0.30), transparent 60%),
        radial-gradient(2px 2px at 55% 68%, rgba(18,23,36,0.18), transparent 60%),
        radial-gradient(2px 2px at 82% 72%, rgba(201,162,75,0.26), transparent 60%);
      animation: dustTwinkle 5s ease-in-out infinite;
    }
    @keyframes smokeDrift{
      0%{ transform: translate3d(-1.6vw,-0.8vh,0) scale(1.03) rotate(-0.3deg); }
      100%{ transform: translate3d(1.8vw,1.0vh,0) scale(1.06) rotate(0.3deg); }
    }
    @keyframes dustTwinkle{
      0%,100%{ filter: brightness(1.00); opacity:.55; }
      50%{ filter: brightness(1.18); opacity:.82; }
    }

    .wrap{ min-height:100vh; display:flex; align-items:center; justify-content:center; padding:24px; position:relative; z-index:2; }
    .card{
      width:min(560px, 100%);
      border-radius: 22px;
      background: rgba(255,255,255,.80);
      border: 1px solid rgba(18,23,36,.10);
      box-shadow: 0 28px 110px rgba(16,20,32,.16);
      backdrop-filter: blur(12px);
      padding: 22px;
    }
    h2{ margin:0; font-family:"Noto Serif SC",serif; font-weight:700; letter-spacing:-0.02em; font-size:22px; line-height:1.15; }
    p{ margin:10px 0 0; color: rgba(18,23,36,.72); font-size:14px; line-height:1.6; }
    .code{
      margin-top:14px;
      padding:14px;
      border-radius:16px;
      border:1px solid rgba(18,23,36,.12);
      background: rgba(255,255,255,0.78);
      font-weight:800;
      letter-spacing:0.06em;
      font-size:16px;
      user-select:all;
      word-break:break-all;
    }
    .btn{
      margin-top:14px;
      width:100%;
      height:46px;
      border-radius:16px;
      border:1px solid rgba(18,23,36,.10);
      background: linear-gradient(135deg, var(--gold), var(--gold2));
      color: rgba(18,23,36,0.92);
      font-weight:900;
      letter-spacing:0.06em;
      cursor:pointer;
      box-shadow: 0 16px 46px rgba(201,162,75,0.24);
    }
    .btn:active{ transform: translateY(1px); }
    .hint{ margin-top:10px; font-size:12px; color: rgba(18,23,36,.52); }
  </style>
</head>

<body>
  <div class="bg"></div>
  <div class="wrap">
    <div class="card">
      <h2>抽奖页面</h2>
      <p>当前资格码：</p>
      <div class="code" id="result">-</div>

      <button class="btn" id="copyGoBtn" type="button">点一下复制并去抽奖</button>
      <div class="hint">点击后会自动跳回首页并带上资格码（自动填入输入框）。</div>
    </div>
  </div>

  <script>
    const params = new URLSearchParams(location.search);
    const code = (params.get('code') || '').trim();
    const el = document.getElementById('result');
    const btn = document.getElementById('copyGoBtn');

    el.textContent = code || '未检测到 code 参数';

    async function copyText(text){
      try{
        await navigator.clipboard.writeText(text);
      }catch(e){
        const ta = document.createElement('textarea');
        ta.value = text;
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        ta.remove();
      }
    }

    btn.addEventListener('click', async () => {
      if (!code) return alert('没有可复制的资格码');
      await copyText(code);
      btn.textContent = '已复制 ✅ 正在跳转...';
      const v = Date.now();
      // ✅ 关键：带 play=1，首页不会再把你重定向回 draw.html
      location.href = `/?code=${encodeURIComponent(code)}&play=1&v=${v}`;
    });
  </script>
</body>
</html>
